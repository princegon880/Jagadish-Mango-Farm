<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Jagadish Mango Farm</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <a href="index.html" class="logo">🥭 Jagadish Mango Farm</a>
            <h2>Admin Secure Access</h2>
            <p>Please log in to access the sales dashboard.</p>
        </div>

        <form id="authForm" class="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="admin@mangofarm.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <div class="action-buttons">
                <button type="submit" id="loginBtn" class="btn-primary">Log In</button>
                <button type="button" id="signupBtn" class="btn-secondary">Sign Up (New Admin)</button>
            </div>
            
            <a href="index.html" class="back-link">&larr; Back to Store</a>
        </form>
    </div>

    <script>
        // Supabase Initialization
        const SUPABASE_URL = 'https://tmrhndrdbgszlpicsbof.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_TZr6E1V9dC-udBumRgwZgA_SHYbzAMQ';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Elements
        const authForm = document.getElementById('authForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const errorMsg = document.getElementById('errorMessage');
        const successMsg = document.getElementById('successMessage');

        // Check if already logged in
        window.addEventListener('load', async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'record.html';
            }
        });

        // Function to show errors
        function showError(msg) {
            errorMsg.innerText = msg;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }

        // Function to show success
        function showSuccess(msg) {
            successMsg.innerText = msg;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
        }

        // Login Handler
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginBtn.disabled = true;
            loginBtn.innerText = "Logging in...";
            errorMsg.style.display = 'none';

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: emailInput.value,
                password: passwordInput.value,
            });

            if (error) {
                showError(error.message);
                loginBtn.disabled = false;
                loginBtn.innerText = "Log In";
            } else {
                window.location.href = 'record.html';
            }
        });

        // Signup Handler
        signupBtn.addEventListener('click', async () => {
            if (!emailInput.value || !passwordInput.value) {
                showError("Please enter both email and password to sign up.");
                return;
            }

            signupBtn.disabled = true;
            signupBtn.innerText = "Signing up...";
            errorMsg.style.display = 'none';

            const { data, error } = await supabaseClient.auth.signUp({
                email: emailInput.value,
                password: passwordInput.value,
            });

            if (error) {
                showError(error.message);
                signupBtn.disabled = false;
                signupBtn.innerText = "Sign Up (New Admin)";
            } else {
                showSuccess("Signup successful! If it didn't redirect, please check your email for a confirmation link (or turn off 'Confirm Email' in Supabase).");
                // If email confirmation is off, they might be logged in automatically
                const { data: { session } } = await supabaseClient.auth.getSession();
                if(session) {
                    window.location.href = 'record.html';
                }
                signupBtn.disabled = false;
                signupBtn.innerText = "Sign Up (New Admin)";
            }
        });
    </script>
</body>
</html>
