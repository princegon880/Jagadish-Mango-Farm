name: Daily CSV Report Generator

on:
  schedule:
    # Runs at 15:30 UTC every day (which is exactly 9:00 PM IST)
    - cron: '30 15 * * *'
  # Allows you to trigger the action manually from the Actions tab for testing
  workflow_dispatch:

jobs:
  generate-and-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install @supabase/supabase-js resend

      - name: Run Report Script
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_EMAIL: ${{ secrets.SUPABASE_EMAIL }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: node scripts/generate_report.js
