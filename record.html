<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Record | Jagadish Mango Farm</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .record-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        .summary-card {
            background: #fff;
            padding: 30px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(0,0,0,0.03);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .summary-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .summary-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: var(--primary-green);
        }
        .summary-card.pending::before {
            background: #ef4444; 
        }
        .summary-title { color: var(--text-muted); font-size: 1.1rem; font-weight: 500; }
        .summary-value { font-size: 2.5rem; font-weight: 800; color: var(--text-dark); margin-top: 12px; letter-spacing: -1px; }

        /* The Form */
        .add-record-form {
            background: #fff;
            padding: 30px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            align-items: end;
            border: 1px solid rgba(0,0,0,0.03);
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group select { 
            padding: 12px; 
            border: 1px solid #e5e7eb; 
            border-radius: var(--radius-md); 
            font-size: 1rem; 
            background: #f9fafb;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(27, 67, 50, 0.1);
            background: #fff;
        }
        
        .readonly-input { background-color: #f3f4f6 !important; cursor: not-allowed; font-weight: 800; color: var(--primary-green) !important; font-size: 1.1rem !important; }

        .btn-add { 
            background: linear-gradient(135deg, var(--mango-gold), var(--mango-gold-dark));
            color: var(--text-dark); 
            font-weight: 800; 
            padding: 14px; 
            border: none; 
            border-radius: var(--radius-md); 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }
        .btn-add:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(245, 158, 11, 0.4);
        }

        /* Search and Filter Controls */
        .controls-container {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .search-bar, .filter-select {
            padding: 14px 20px;
            font-size: 1rem;
            border: 1px solid #e5e7eb;
            border-radius: var(--radius-md);
            outline: none;
            background: #fff;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
            font-family: inherit;
        }
        .search-bar { flex: 2; min-width: 300px; }
        .filter-select { flex: 1; min-width: 180px; }
        .search-bar:focus, .filter-select:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(27, 67, 50, 0.1);
        }
        .btn-clear {
            background: var(--text-muted); color: white; border: none; padding: 14px 24px; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; font-size: 1rem; transition: all 0.3s ease;
        }
        .btn-clear:hover { background: var(--text-dark); }

        /* The Excel-like Table */
        .table-wrapper {
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.03);
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 18px 24px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
        th { background-color: #f8fafc; color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px; }
        tr { transition: background-color 0.2s; }
        tr:hover { background-color: #f9fafb; }
        td { font-size: 1rem; color: var(--text-dark); }

        /* Interactive Badges & Buttons */
        .badge { 
            padding: 6px 14px; border-radius: var(--radius-full); font-size: 0.85rem; font-weight: 700; text-align: center; display: inline-flex; align-items: center; gap: 4px; cursor: pointer; transition: all 0.2s ease; user-select: none;
        }
        .badge:hover { filter: brightness(0.95); transform: scale(1.02); } 
        .badge.paid { background-color: #d1fae5; color: #065f46; }
        .badge.unpaid { background-color: #fee2e2; color: #991b1b; }

        /* Action Buttons */
        .action-btns { display: flex; gap: 10px; }
        .edit-btn { background: #eff6ff; color: #2563eb; border: none; padding: 8px 14px; border-radius: var(--radius-md); cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.2s; }
        .edit-btn:hover { background: #dbeafe; }
        .delete-btn { background: #fef2f2; color: #dc2626; border: none; padding: 8px 14px; border-radius: var(--radius-md); cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.2s; }
        .delete-btn:hover { background: #fee2e2; }
    </style>
</head>
<body style="background-color: var(--background);">

    <header>
        <a href="index.html" class="logo">🥭 Jagadish Mango Farm</a>
        <a href="index.html" style="text-decoration: none; color: var(--primary-green); font-weight: 600;">&larr; Back to Store</a>
    </header>

    <div class="record-container">
        <h1 style="color: var(--primary-green); margin-bottom: 30px; font-size: 2.5rem; font-weight: 800; letter-spacing: -0.5px;">Daily Sales Ledger</h1>

        <div class="summary-grid">
            <div class="summary-card">
                <div class="summary-title">Total Mangoes Sold</div>
                <div class="summary-value" id="total-kg">0 kg</div>
            </div>
            <div class="summary-card">
                <div class="summary-title">Total Received (Paid)</div>
                <div class="summary-value" id="total-revenue" style="color: #2E7D32;">₹0</div>
            </div>
            <div class="summary-card pending">
                <div class="summary-title">Pending Dues (Unpaid)</div>
                <div class="summary-value" id="total-pending" style="color: #d32f2f;">₹0</div>
            </div>
        </div>

        <form class="add-record-form" id="recordForm">
            <div class="form-group">
                <label>Date of Sale</label>
                <input type="date" id="recordDate" required>
            </div>

            <div class="form-group">
                <label>Client Name</label>
                <input type="text" id="clientName" required placeholder="e.g. Ramesh Bhai">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="clientPhone" required pattern="[0-9]{10}" maxlength="10" placeholder="10-digit number">
            </div>
            
            <div class="form-group">
                <label>Price per KG (₹)</label>
                <input type="number" id="pricePerKg" required min="1" value="120">
            </div>

            <div class="form-group">
                <label>Weight (Per Box)</label>
                <select id="weightSelect" required>
                    <option value="" disabled selected>Select weight...</option>
                    <option value="1">1 KG Box</option>
                    <option value="10">10 KG Family Box</option>
                    <option value="20">20 KG Wholesale</option>
                    <option value="manual">Enter Manual KG...</option>
                </select>
                <input type="number" id="manualWeight" placeholder="Enter custom KG" style="display:none; margin-top:8px;" min="0.5" step="0.5">
            </div>

            <div class="form-group">
                <label>Qty (Boxes)</label>
                <input type="number" id="boxQty" required min="1" value="1">
            </div>

            <div class="form-group">
                <label>Total Price (₹)</label>
                <input type="number" id="totalPrice" class="readonly-input" readonly placeholder="Auto-calculated">
            </div>

            <div class="form-group">
                <label>Payment Status</label>
                <select id="paymentStatus" required>
                    <option value="Paid">Paid</option>
                    <option value="Unpaid">Unpaid</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" class="btn-add" style="grid-column: 1 / -1; width: 100%; max-width: 250px;">+ Add Record</button>
        </form>

        <div class="controls-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Global Search: Find client in entire database...">
            
            <input type="date" id="dateFilter" class="filter-select" title="View records for a specific day">
            
            <select id="statusFilter" class="filter-select">
                <option value="All">All Statuses</option>
                <option value="Paid">Paid Only</option>
                <option value="Unpaid">Unpaid Only</option>
            </select>

            <button id="showAllBtn" class="btn-clear">Clear Filters</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Client Name</th>
                        <th>Phone</th>
                        <th>Order Details</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let salesData = [];
        let editingId = null; 

        // --- Helper: Get Today's Date in YYYY-MM-DD format ---
        function getTodayDate() {
            const tzoffset = (new Date()).getTimezoneOffset() * 60000;
            return new Date(Date.now() - tzoffset).toISOString().split('T')[0];
        }

        // --- Helper: Format YYYY-MM-DD to DD/MM/YYYY for reading ---
        function formatDateForDisplay(dateString) {
            if(!dateString) return '';
            const [year, month, day] = dateString.split('-');
            return `${day}/${month}/${year}`;
        }

        // --- DOM Elements ---
        const recordDateInput = document.getElementById('recordDate');
        const pricePerKgInput = document.getElementById('pricePerKg');
        const weightSelect = document.getElementById('weightSelect');
        const manualWeightInput = document.getElementById('manualWeight');
        const boxQtyInput = document.getElementById('boxQty');
        const totalPriceInput = document.getElementById('totalPrice');
        
        const searchInput = document.getElementById('searchInput');
        const dateFilterInput = document.getElementById('dateFilter');
        const statusFilterInput = document.getElementById('statusFilter'); // New
        const submitBtn = document.getElementById('submitBtn');

        // Set defaults to today
        recordDateInput.value = getTodayDate();
        dateFilterInput.value = getTodayDate();

        // --- Auto-Calculate Function ---
        function calculateTotal() {
            let kg = 0;
            if (weightSelect.value === 'manual') {
                manualWeightInput.style.display = 'block';
                kg = parseFloat(manualWeightInput.value) || 0;
            } else {
                manualWeightInput.style.display = 'none';
                kg = parseFloat(weightSelect.value) || 0;
            }

            const pricePerKg = parseFloat(pricePerKgInput.value) || 0;
            const qty = parseInt(boxQtyInput.value) || 1;
            const total = kg * qty * pricePerKg;
            
            totalPriceInput.value = total > 0 ? total : '';
        }

        // Listeners for calculation and filtering
        pricePerKgInput.addEventListener('input', calculateTotal);
        weightSelect.addEventListener('change', calculateTotal);
        manualWeightInput.addEventListener('input', calculateTotal);
        boxQtyInput.addEventListener('input', calculateTotal);
        
        searchInput.addEventListener('input', updateDashboard);
        dateFilterInput.addEventListener('change', updateDashboard);
        statusFilterInput.addEventListener('change', updateDashboard); // New Listener
        
        document.getElementById('showAllBtn').addEventListener('click', () => {
            dateFilterInput.value = ''; // Clears the date filter
            searchInput.value = '';     // Clears the search
            statusFilterInput.value = 'All'; // Clears the status filter
            updateDashboard();
        });

        // --- Add / Update Record Function ---
        document.getElementById('recordForm').addEventListener('submit', function(e) {
            e.preventDefault(); 

            const date = recordDateInput.value;
            const name = document.getElementById('clientName').value;
            const phone = document.getElementById('clientPhone').value;
            const status = document.getElementById('paymentStatus').value;
            
            const pricePerKg = parseFloat(pricePerKgInput.value);
            const qty = parseInt(boxQtyInput.value);
            const price = parseFloat(totalPriceInput.value);
            
            if(phone.length !== 10) {
                alert("Please ensure the phone number is exactly 10 digits long.");
                return;
            }

            let baseKg = weightSelect.value === 'manual' ? parseFloat(manualWeightInput.value) : parseFloat(weightSelect.value);

            if (editingId !== null) {
                const recordIndex = salesData.findIndex(r => r.id === editingId);
                if (recordIndex !== -1) {
                    salesData[recordIndex].date = date;
                    salesData[recordIndex].name = name;
                    salesData[recordIndex].phone = phone;
                    salesData[recordIndex].pricePerKg = pricePerKg;
                    salesData[recordIndex].baseKg = baseKg;
                    salesData[recordIndex].qty = qty;
                    salesData[recordIndex].price = price;
                    salesData[recordIndex].status = status;
                }
                
                editingId = null;
                submitBtn.innerHTML = "+ Add Record";
                submitBtn.style.backgroundColor = "var(--mango-gold)";
                submitBtn.style.color = "#333";
            } else {
                salesData.push({ 
                    id: Date.now(), 
                    date, // Saved as YYYY-MM-DD
                    name, 
                    phone, 
                    pricePerKg, 
                    baseKg, 
                    qty, 
                    price, 
                    status 
                });
            }

            // Auto-switch the view filter to the date you just saved the record to
            dateFilterInput.value = date;
            
            updateDashboard();

            const currentPrice = pricePerKgInput.value;
            this.reset();
            recordDateInput.value = getTodayDate(); // reset form to today
            pricePerKgInput.value = currentPrice;
            boxQtyInput.value = 1;
            manualWeightInput.style.display = 'none';
        });

        // --- EDIT Record Function ---
        function editRecord(id) {
            const record = salesData.find(r => r.id === id);
            if (!record) return;

            recordDateInput.value = record.date;
            document.getElementById('clientName').value = record.name;
            document.getElementById('clientPhone').value = record.phone;
            pricePerKgInput.value = record.pricePerKg;
            boxQtyInput.value = record.qty;
            document.getElementById('paymentStatus').value = record.status;

            if (['1', '10', '20'].includes(record.baseKg.toString())) {
                weightSelect.value = record.baseKg;
                manualWeightInput.style.display = 'none';
            } else {
                weightSelect.value = 'manual';
                manualWeightInput.style.display = 'block';
                manualWeightInput.value = record.baseKg;
            }

            calculateTotal();

            editingId = id;
            submitBtn.innerHTML = "💾 Update Record";
            submitBtn.style.backgroundColor = "#2E7D32"; 
            submitBtn.style.color = "white";

            document.querySelector('.add-record-form').scrollIntoView({ behavior: 'smooth' });
        }

        // --- DELETE Record Function ---
        function deleteRecord(id) {
            if(confirm("Are you sure you want to delete this record?")) {
                salesData = salesData.filter(record => record.id !== id);
                updateDashboard();
            }
        }

        // --- Toggle Status Function ---
        function toggleStatus(id) {
            const record = salesData.find(record => record.id === id);
            if(record) {
                record.status = record.status === 'Paid' ? 'Unpaid' : 'Paid';
                updateDashboard();
            }
        }

        // --- Update Screen Function ---
        function updateDashboard() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 

            const searchTerm = searchInput.value.toLowerCase();
            const filterDate = dateFilterInput.value;
            const filterStatus = statusFilterInput.value; // NEW

            let totalKg = 0;
            let totalRev = 0;
            let totalPending = 0; 

            // LOGIC: Filter the records before drawing the table
            const filteredData = salesData.filter(record => {
                // Rule 1: Filter by Paid/Unpaid Status First
                if (filterStatus !== 'All' && record.status !== filterStatus) {
                    return false;
                }

                // Rule 2: If user is searching, IGNORE the date filter (Global Search)
                if (searchTerm !== "") {
                    return record.name.toLowerCase().includes(searchTerm) || record.phone.includes(searchTerm);
                }
                
                // Rule 3: If NOT searching, but a date is selected, show only that day
                if (filterDate !== "") {
                    return record.date === filterDate;
                }

                // Rule 4: If no search and no date filter, show everything
                return true; 
            });

            // Draw the filtered records
            filteredData.forEach(record => {
                const orderTotalKg = record.baseKg * record.qty;
                totalKg += orderTotalKg;
                
                if(record.status === 'Paid') {
                    totalRev += record.price;
                } else {
                    totalPending += record.price;
                }

                const badgeClass = record.status === 'Paid' ? 'badge paid' : 'badge unpaid';
                const displayDate = formatDateForDisplay(record.date); // Make it DD/MM/YYYY

                const row = `<tr>
                    <td>${displayDate}</td>
                    <td><strong>${record.name}</strong></td>
                    <td>${record.phone}</td>
                    <td>
                        <span style="color:#555; font-size:0.9rem;">${record.qty}x ${record.baseKg}kg boxes</span><br>
                        <strong>${orderTotalKg} kg total</strong>
                    </td>
                    <td style="font-weight: bold; color: #2E7D32;">₹${record.price.toLocaleString('en-IN')}</td>
                    <td>
                        <span class="${badgeClass}" onclick="toggleStatus(${record.id})" title="Click to change payment status">
                            ${record.status} ↺
                        </span>
                    </td>
                    <td>
                        <div class="action-btns">
                            <button onclick="editRecord(${record.id})" class="edit-btn">✏️ Edit</button>
                            <button onclick="deleteRecord(${record.id})" class="delete-btn">🗑️</button>
                        </div>
                    </td>
                </tr>`;
                
                tbody.innerHTML += row;
            });

            document.getElementById('total-kg').innerText = totalKg + ' kg';
            document.getElementById('total-revenue').innerText = '₹' + totalRev.toLocaleString('en-IN');
            document.getElementById('total-pending').innerText = '₹' + totalPending.toLocaleString('en-IN');
        }
    </script>
</body>
</html>
