<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Record | Jagadish Mango Farm</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .record-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .summary-card {
            background: #fff;
            padding: 30px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(0, 0, 0, 0.03);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .summary-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .summary-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: var(--primary-green);
        }

        .summary-card.pending::before {
            background: #ef4444;
        }

        .summary-title {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 500;
        }

        .summary-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-top: 12px;
            letter-spacing: -1px;
        }

        /* The Form */
        .add-record-form {
            background: #fff;
            padding: 30px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            align-items: end;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: var(--radius-md);
            font-size: 1rem;
            background: #f9fafb;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(27, 67, 50, 0.1);
            background: #fff;
        }

        .readonly-input {
            background-color: #f3f4f6 !important;
            cursor: not-allowed;
            font-weight: 800;
            color: var(--primary-green) !important;
            font-size: 1.1rem !important;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--mango-gold), var(--mango-gold-dark));
            color: var(--text-dark);
            font-weight: 800;
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(245, 158, 11, 0.4);
        }

        /* Search and Filter Controls */
        .controls-container {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .search-bar,
        .filter-select {
            padding: 14px 20px;
            font-size: 1rem;
            border: 1px solid #e5e7eb;
            border-radius: var(--radius-md);
            outline: none;
            background: #fff;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
            font-family: inherit;
        }

        .search-bar {
            flex: 2;
            min-width: 300px;
        }

        .filter-select {
            flex: 1;
            min-width: 180px;
        }

        .search-bar:focus,
        .filter-select:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(27, 67, 50, 0.1);
        }

        .btn-clear {
            background: var(--text-muted);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-clear:hover {
            background: var(--text-dark);
        }

        /* The Excel-like Table */
        .table-wrapper {
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th,
        td {
            padding: 18px 24px;
            border-bottom: 1px solid #f3f4f6;
            vertical-align: middle;
        }

        th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        tr {
            transition: background-color 0.2s;
        }

        tr:hover {
            background-color: #f9fafb;
        }

        td {
            font-size: 1rem;
            color: var(--text-dark);
        }

        /* Interactive Badges & Buttons */
        .badge {
            padding: 6px 14px;
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 700;
            text-align: center;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .badge:hover {
            filter: brightness(0.95);
            transform: scale(1.02);
        }

        .badge.paid {
            background-color: #d1fae5;
            color: #065f46;
        }

        .badge.unpaid {
            background-color: #fee2e2;
            color: #991b1b;
        }

        /* Action Buttons */
        .action-btns {
            display: flex;
            gap: 10px;
        }

        .edit-btn {
            background: #eff6ff;
            color: #2563eb;
            border: none;
            padding: 8px 14px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .edit-btn:hover {
            background: #dbeafe;
        }

        .delete-btn {
            background: #fef2f2;
            color: #dc2626;
            border: none;
            padding: 8px 14px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #fee2e2;
        }
    </style>
</head>

<body style="background-color: var(--background);">

    <header>
        <a href="index.html" class="logo">🥭 Jagadish Mango Farm</a>
        <div style="display: flex; gap: 15px; align-items: center;">
            <a href="index.html" style="text-decoration: none; color: var(--primary-green); font-weight: 600;">&larr; Back to Store</a>
            <button id="logoutBtn" style="background: #fee2e2; color: #dc2626; border: none; padding: 8px 14px; border-radius: var(--radius-md); cursor: pointer; font-weight: 600;">Logout</button>
        </div>
    </header>

    <div class="record-container">
        <h1
            style="color: var(--primary-green); margin-bottom: 20px; font-size: 2.5rem; font-weight: 800; letter-spacing: -0.5px;">
            Sales Dashboard</h1>

        <div class="dashboard-tabs" style="display: flex; gap: 30px; margin-bottom: 30px; border-bottom: 2px solid #e5e7eb; padding-bottom: 5px;">
            <button id="tabManual" style="background: none; border: none; font-size: 1.25rem; font-weight: 800; color: var(--primary-green); border-bottom: 3px solid var(--primary-green); padding-bottom: 8px; cursor: pointer; transition: all 0.3s;">Manual Sales Ledger</button>
            <button id="tabOnline" style="background: none; border: none; font-size: 1.25rem; font-weight: 600; color: var(--text-muted); border-bottom: 3px solid transparent; padding-bottom: 8px; cursor: pointer; transition: all 0.3s;">Online Orders</button>
        </div>

        <div id="manualSection">

        <div class="summary-grid">
            <div class="summary-card">
                <div class="summary-title">Total Mangoes Sold</div>
                <div class="summary-value" id="total-kg">0 kg</div>
            </div>
            <div class="summary-card">
                <div class="summary-title">Total Received (Paid)</div>
                <div class="summary-value" id="total-revenue" style="color: #2E7D32;">₹0</div>
            </div>
            <div class="summary-card pending">
                <div class="summary-title">Pending Dues (Unpaid)</div>
                <div class="summary-value" id="total-pending" style="color: #d32f2f;">₹0</div>
            </div>
        </div>

        <!-- Charts Grid -->
        <div class="charts-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin-bottom: 40px;">
            <div class="summary-card" style="padding: 20px;">
                <canvas id="revenueChart"></canvas>
            </div>
            <div class="summary-card" style="padding: 20px;">
                <canvas id="statusChart"></canvas>
            </div>
            <div class="summary-card" style="padding: 20px;">
                <canvas id="boxSizeChart"></canvas>
            </div>
        </div>

        <form class="add-record-form" id="recordForm">
            <div class="form-group">
                <label>Date of Sale</label>
                <input type="date" id="recordDate" required>
            </div>

            <div class="form-group">
                <label>Client Name</label>
                <input type="text" id="clientName" required placeholder="e.g. Ramesh Bhai">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="clientPhone" required pattern="[0-9]{10}" maxlength="10"
                    placeholder="10-digit number">
            </div>

            <div class="form-group">
                <label>Price per KG (₹)</label>
                <input type="number" id="pricePerKg" required min="1" value="120">
            </div>

            <div class="form-group">
                <label>Weight (Per Box)</label>
                <select id="weightSelect" required>
                    <option value="" disabled selected>Select weight...</option>
                    <option value="1">1 KG Box</option>
                    <option value="10">10 KG Family Box</option>
                    <option value="20">20 KG Wholesale</option>
                    <option value="manual">Enter Manual KG...</option>
                </select>
                <input type="number" id="manualWeight" placeholder="Enter custom KG"
                    style="display:none; margin-top:8px;" min="0.5" step="0.5">
            </div>

            <div class="form-group">
                <label>Qty (Boxes)</label>
                <input type="number" id="boxQty" required min="1" value="1">
            </div>

            <div class="form-group">
                <label>Total Price (₹)</label>
                <input type="number" id="totalPrice" class="readonly-input" readonly placeholder="Auto-calculated">
            </div>

            <div class="form-group">
                <label>Payment Status</label>
                <select id="paymentStatus" required>
                    <option value="Paid">Paid</option>
                    <option value="Unpaid">Unpaid</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" class="btn-add"
                style="grid-column: 1 / -1; width: 100%; max-width: 250px;">+ Add Record</button>
        </form>

        <div class="controls-container">
            <input type="text" id="searchInput" class="search-bar"
                placeholder="🔍 Global Search: Find client in entire database...">

            <input type="date" id="dateFilter" class="filter-select" title="View records for a specific day">

            <select id="statusFilter" class="filter-select">
                <option value="All">All Statuses</option>
                <option value="Paid">Paid Only</option>
                <option value="Unpaid">Unpaid Only</option>
            </select>

            <button id="showAllBtn" class="btn-clear">Clear Filters</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Client Name</th>
                        <th>Phone</th>
                        <th>Order Details</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
        </div> <!-- End manualSection -->

        <!-- Online Orders Section -->
        <div id="onlineSection" style="display: none;">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Order Date</th>
                            <th>Customer Name</th>
                            <th>Contact</th>
                            <th>Shipping Address</th>
                            <th>Items Summary</th>
                            <th>Total Amount</th>
                        </tr>
                    </thead>
                    <tbody id="onlineTableBody">
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = 'https://tmrhndrdbgszlpicsbof.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_TZr6E1V9dC-udBumRgwZgA_SHYbzAMQ';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let salesData = [];
        let editingId = null;
        let currentUserId = null;

        // --- Helper: Get Today's Date in YYYY-MM-DD format ---
        function getTodayDate() {
            const tzoffset = (new Date()).getTimezoneOffset() * 60000;
            return new Date(Date.now() - tzoffset).toISOString().split('T')[0];
        }

        // --- Helper: Format YYYY-MM-DD to DD/MM/YYYY for reading ---
        function formatDateForDisplay(dateString) {
            if (!dateString) return '';
            const [year, month, day] = dateString.split('-');
            return `${day}/${month}/${year}`;
        }

        // --- DOM Elements ---
        const recordDateInput = document.getElementById('recordDate');
        const pricePerKgInput = document.getElementById('pricePerKg');
        const weightSelect = document.getElementById('weightSelect');
        const manualWeightInput = document.getElementById('manualWeight');
        const boxQtyInput = document.getElementById('boxQty');
        const totalPriceInput = document.getElementById('totalPrice');

        const searchInput = document.getElementById('searchInput');
        const dateFilterInput = document.getElementById('dateFilter');
        const statusFilterInput = document.getElementById('statusFilter');
        const submitBtn = document.getElementById('submitBtn');

        // Set defaults to today
        recordDateInput.value = getTodayDate();
        dateFilterInput.value = getTodayDate();

        // --- Fetch Data from Supabase ---
        async function fetchRecords() {
            // Only fetch records that belong to the current user
            const { data, error } = await supabaseClient
                .from('sales_records')
                .select('*')
                .eq('user_id', currentUserId)
                .order('date', { ascending: false });

            if (error) {
                console.error("Error fetching data:", error);
                alert("Could not load records from database. Did you create the sales_records table?");
            } else {
                salesData = data || [];
                updateDashboard();
            }
        }

        // Load data when page loads
        window.addEventListener('load', async () => {
            // Secure Route Check
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                // Not logged in -> Kick to login page
                window.location.href = 'login.html';
                return;
            }
            
            // Store the logged-in user's ID for multi-tenant isolation
            currentUserId = session.user.id;
            
            // Logged in -> Load data
            fetchRecords();
        });

        // Logout Handler
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        });

        // --- Auto-Calculate Function ---
        function calculateTotal() {
            let kg = 0;
            if (weightSelect.value === 'manual') {
                manualWeightInput.style.display = 'block';
                kg = parseFloat(manualWeightInput.value) || 0;
            } else {
                manualWeightInput.style.display = 'none';
                kg = parseFloat(weightSelect.value) || 0;
            }

            const pricePerKg = parseFloat(pricePerKgInput.value) || 0;
            const qty = parseInt(boxQtyInput.value) || 1;
            const total = kg * qty * pricePerKg;

            totalPriceInput.value = total > 0 ? total : '';
        }

        // Listeners for calculation and filtering
        pricePerKgInput.addEventListener('input', calculateTotal);
        weightSelect.addEventListener('change', calculateTotal);
        manualWeightInput.addEventListener('input', calculateTotal);
        boxQtyInput.addEventListener('input', calculateTotal);

        searchInput.addEventListener('input', updateDashboard);
        dateFilterInput.addEventListener('change', updateDashboard);
        statusFilterInput.addEventListener('change', updateDashboard);

        document.getElementById('showAllBtn').addEventListener('click', () => {
            dateFilterInput.value = '';
            searchInput.value = '';
            statusFilterInput.value = 'All';
            updateDashboard();
        });

        // --- Add / Update Record Function ---
        document.getElementById('recordForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            submitBtn.disabled = true;
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = "⏳ Saving...";

            const date = recordDateInput.value;
            const name = document.getElementById('clientName').value;
            const phone = document.getElementById('clientPhone').value;
            const status = document.getElementById('paymentStatus').value;

            const pricePerKg = parseFloat(pricePerKgInput.value);
            const qty = parseInt(boxQtyInput.value);
            const price = parseFloat(totalPriceInput.value);

            if (phone.length !== 10) {
                alert("Please ensure the phone number is exactly 10 digits long.");
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
                return;
            }

            let baseKg = weightSelect.value === 'manual' ? parseFloat(manualWeightInput.value) : parseFloat(weightSelect.value);

            const newRecord = {
                user_id: currentUserId,
                date: date,
                name: name,
                phone: phone,
                "pricePerKg": pricePerKg,
                "baseKg": baseKg,
                qty: qty,
                price: price,
                status: status
            };

            if (editingId !== null) {
                const { error } = await supabaseClient
                    .from('sales_records')
                    .update(newRecord)
                    .eq('id', editingId);

                if (error) {
                    alert("Error updating record: " + error.message);
                } else {
                    const recordIndex = salesData.findIndex(r => r.id === editingId);
                    if (recordIndex !== -1) {
                        salesData[recordIndex] = { ...salesData[recordIndex], ...newRecord };
                    }
                }

                editingId = null;
                submitBtn.style.backgroundColor = "";
                submitBtn.style.color = "";
            } else {
                const { data, error } = await supabaseClient
                    .from('sales_records')
                    .insert([newRecord])
                    .select();

                if (error) {
                    alert("Error saving record: " + error.message);
                } else if (data && data.length > 0) {
                    salesData.unshift(data[0]);
                }
            }

            submitBtn.disabled = false;
            submitBtn.innerHTML = "+ Add Record";
            dateFilterInput.value = date;

            updateDashboard();

            const currentPrice = pricePerKgInput.value;
            this.reset();
            recordDateInput.value = getTodayDate();
            pricePerKgInput.value = currentPrice;
            boxQtyInput.value = 1;
            manualWeightInput.style.display = 'none';
        });

        // --- EDIT Record Function ---
        function editRecord(id) {
            const record = salesData.find(r => r.id === id);
            if (!record) return;

            recordDateInput.value = record.date;
            document.getElementById('clientName').value = record.name;
            document.getElementById('clientPhone').value = record.phone;
            pricePerKgInput.value = record.pricePerKg;
            boxQtyInput.value = record.qty;
            document.getElementById('paymentStatus').value = record.status;

            if (['1', '10', '20'].includes(record.baseKg.toString())) {
                weightSelect.value = record.baseKg.toString();
                manualWeightInput.style.display = 'none';
            } else {
                weightSelect.value = 'manual';
                manualWeightInput.style.display = 'block';
                manualWeightInput.value = record.baseKg;
            }

            calculateTotal();

            editingId = id;
            submitBtn.innerHTML = "💾 Update Record";
            submitBtn.style.backgroundColor = "#1b4332";
            submitBtn.style.color = "white";

            document.querySelector('.add-record-form').scrollIntoView({ behavior: 'smooth' });
        }

        // --- DELETE Record Function ---
        async function deleteRecord(id) {
            if (confirm("Are you sure you want to delete this record?")) {
                const { error } = await supabaseClient
                    .from('sales_records')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert("Error deleting record: " + error.message);
                } else {
                    salesData = salesData.filter(record => record.id !== id);
                    updateDashboard();
                }
            }
        }

        // --- Toggle Status Function ---
        async function toggleStatus(id) {
            const record = salesData.find(record => record.id === id);
            if (record) {
                const newStatus = record.status === 'Paid' ? 'Unpaid' : 'Paid';

                // Optimistic UI update
                record.status = newStatus;
                updateDashboard();

                // Update in DB
                const { error } = await supabaseClient
                    .from('sales_records')
                    .update({ status: newStatus })
                    .eq('id', id);

                if (error) {
                    alert("Error updating status: " + error.message);
                    // Revert on failure
                    record.status = newStatus === 'Paid' ? 'Unpaid' : 'Paid';
                    updateDashboard();
                }
            }
        }

        // --- Update Screen Function ---
        function updateDashboard() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const searchTerm = searchInput.value.toLowerCase();
            const filterDate = dateFilterInput.value;
            const filterStatus = statusFilterInput.value;

            let totalKg = 0;
            let totalRev = 0;
            let totalPending = 0;

            const filteredData = salesData.filter(record => {
                if (filterStatus !== 'All' && record.status !== filterStatus) {
                    return false;
                }
                if (searchTerm !== "") {
                    return record.name.toLowerCase().includes(searchTerm) || record.phone.includes(searchTerm);
                }
                if (filterDate !== "") {
                    return record.date === filterDate;
                }
                return true;
            });

            filteredData.forEach(record => {
                const orderTotalKg = record.baseKg * record.qty;
                totalKg += orderTotalKg;

                if (record.status === 'Paid') {
                    totalRev += record.price;
                } else {
                    totalPending += record.price;
                }

                const badgeClass = record.status === 'Paid' ? 'badge paid' : 'badge unpaid';
                const displayDate = formatDateForDisplay(record.date);

                const row = `<tr>
                    <td>${displayDate}</td>
                    <td><strong>${record.name}</strong></td>
                    <td>${record.phone}</td>
                    <td>
                        <span style="color:#555; font-size:0.9rem;">${record.qty}x ${record.baseKg}kg boxes</span><br>
                        <strong>${orderTotalKg} kg total</strong>
                    </td>
                    <td style="font-weight: bold; color: var(--primary-green);">₹${record.price.toLocaleString('en-IN')}</td>
                    <td>
                        <span class="${badgeClass}" onclick="toggleStatus(${record.id})" title="Click to change payment status">
                            ${record.status} ↺
                        </span>
                    </td>
                    <td>
                        <div class="action-btns">
                            <button onclick="editRecord(${record.id})" class="edit-btn">✏️ Edit</button>
                            <button onclick="deleteRecord(${record.id})" class="delete-btn">🗑️</button>
                        </div>
                    </td>
                </tr>`;

                tbody.innerHTML += row;
            });

            document.getElementById('total-kg').innerText = totalKg + ' kg';
            document.getElementById('total-revenue').innerText = '₹' + totalRev.toLocaleString('en-IN');
            document.getElementById('total-pending').innerText = '₹' + totalPending.toLocaleString('en-IN');
            
            // Update the charts with the new filtered data
            if (typeof updateCharts === 'function') {
                updateCharts(filteredData);
            }
        }

        // --- Tab Switching Logic ---
        const tabManual = document.getElementById('tabManual');
        const tabOnline = document.getElementById('tabOnline');
        const manualSection = document.getElementById('manualSection');
        const onlineSection = document.getElementById('onlineSection');

        let onlineOrdersFetched = false;

        tabManual.addEventListener('click', () => {
            tabManual.style.color = 'var(--primary-green)';
            tabManual.style.fontWeight = '800';
            tabManual.style.borderBottomColor = 'var(--primary-green)';
            
            tabOnline.style.color = 'var(--text-muted)';
            tabOnline.style.fontWeight = '600';
            tabOnline.style.borderBottomColor = 'transparent';
            
            manualSection.style.display = 'block';
            onlineSection.style.display = 'none';
        });

        tabOnline.addEventListener('click', () => {
            tabOnline.style.color = 'var(--primary-green)';
            tabOnline.style.fontWeight = '800';
            tabOnline.style.borderBottomColor = 'var(--primary-green)';
            
            tabManual.style.color = 'var(--text-muted)';
            tabManual.style.fontWeight = '600';
            tabManual.style.borderBottomColor = 'transparent';
            
            manualSection.style.display = 'none';
            onlineSection.style.display = 'block';
            
            if (!onlineOrdersFetched) {
                fetchOnlineOrders();
            }
        });

        // --- Fetch & Render Online Orders ---
        async function fetchOnlineOrders() {
            const tbody = document.getElementById('onlineTableBody');
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: #777;">Loading online orders...</td></tr>';

            const { data, error } = await supabaseClient
                .from('customer_orders')
                .select('*')
                .eq('user_id', currentUserId)
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error fetching online orders:", error);
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 40px; color: red;">Error loading online orders.</td></tr>`;
            } else {
                onlineOrdersFetched = true;
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: #777;">No online orders yet.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                data.forEach(order => {
                    const dateObj = new Date(order.created_at);
                    const displayDate = dateObj.toLocaleDateString('en-IN') + ' ' + dateObj.toLocaleTimeString('en-IN', {hour: '2-digit', minute:'2-digit'});

                    const row = `<tr>
                        <td style="font-size: 0.9rem; color: #666;">${displayDate}<br><b style="color:var(--primary-green);">#${order.id}</b></td>
                        <td><strong>${order.customer_name}</strong></td>
                        <td>${order.customer_phone}</td>
                        <td style="max-width: 250px; font-size: 0.9rem;">${order.shipping_address}</td>
                        <td style="max-width: 300px; font-size: 0.95rem;">${order.items_summary}</td>
                        <td style="font-weight: bold; color: var(--primary-green);">₹${order.total_price.toLocaleString('en-IN')}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            }
        }

        // --- Chart.js Initialization & Updating Logic ---
        let revenueChartInstance = null;
        let statusChartInstance = null;
        let boxSizeChartInstance = null;

        function initCharts() {
            // Wait for DOM
            if(!document.getElementById('revenueChart')) return;

            const revCtx = document.getElementById('revenueChart').getContext('2d');
            revenueChartInstance = new Chart(revCtx, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'Revenue (₹)', data: [], borderColor: '#2E7D32', backgroundColor: 'rgba(46, 125, 50, 0.1)', tension: 0.4, fill: true }] },
                options: { responsive: true, plugins: { title: { display: true, text: 'Revenue Trend (Daily)' } } }
            });

            const statusCtx = document.getElementById('statusChart').getContext('2d');
            statusChartInstance = new Chart(statusCtx, {
                type: 'doughnut',
                data: { labels: ['Paid (₹)', 'Unpaid (₹)'], datasets: [{ data: [0, 0], backgroundColor: ['#2E7D32', '#ef4444'], borderWidth: 0 }] },
                options: { responsive: true, plugins: { title: { display: true, text: 'Revenue Collection Status' } } }
            });

            const boxCtx = document.getElementById('boxSizeChart').getContext('2d');
            boxSizeChartInstance = new Chart(boxCtx, {
                type: 'bar',
                data: { labels: [], datasets: [{ label: 'Boxes Sold', data: [], backgroundColor: '#f59e0b', borderRadius: 4 }] },
                options: { responsive: true, plugins: { title: { display: true, text: 'Popular Box Sizes' } }, scales: { y: { beginAtZero: true } } }
            });
        }

        function updateCharts(data) {
            if (!revenueChartInstance) initCharts();
            if (!revenueChartInstance) return;

            // Process Data
            const revenueByDate = {};
            let paidCount = 0, unpaidCount = 0;
            const boxCount = {};

            data.forEach(record => {
                // Revenue Trend
                revenueByDate[record.date] = (revenueByDate[record.date] || 0) + record.price;
                
                // Status Ratio (by value)
                if (record.status === 'Paid') paidCount += record.price;
                else unpaidCount += record.price;

                // Box Size popularity
                const sizeLabel = record.baseKg + ' KG';
                boxCount[sizeLabel] = (boxCount[sizeLabel] || 0) + record.qty;
            });

            // Update Line Chart (Chronological Order)
            const sortedDates = Object.keys(revenueByDate).sort();
            revenueChartInstance.data.labels = sortedDates;
            revenueChartInstance.data.datasets[0].data = sortedDates.map(date => revenueByDate[date]);
            revenueChartInstance.update();

            // Update Doughnut Chart
            statusChartInstance.data.datasets[0].data = [paidCount, unpaidCount];
            statusChartInstance.update();

            // Update Bar Chart
            const sortedSizes = Object.keys(boxCount).sort((a,b) => parseFloat(a) - parseFloat(b));
            boxSizeChartInstance.data.labels = sortedSizes;
            boxSizeChartInstance.data.datasets[0].data = sortedSizes.map(size => boxCount[size]);
            boxSizeChartInstance.update();
        }

        // Initialize empty charts so they are ready when fetchRecords completes
        window.addEventListener('DOMContentLoaded', () => {
            initCharts();
        });
    </script>
</body>
</html>
